name: Gating

# Frontend gate: type-check + lint + unit tests + production build must all
# pass before a change is considered shippable. The single-file build artifact
# (dist/index.html) is later copied into the cliproxyapi backend repo and served
# via bind mount, so breakage here ships straight to the management UI.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: gating-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gating:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check (tsc --noEmit)
        run: bun run type-check

      - name: Lint (eslint)
        run: bun run lint

      - name: Unit tests (bun test)
        run: bun run test

      - name: Production build (tsc && vite build)
        run: bun run build
